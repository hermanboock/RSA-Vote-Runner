<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote Runner — SA Political Dash</title>
<style>
  :root {
    --bg:       #18181A;
    --surface:  #222226;
    --surface2: #2A2A2E;
    --border:   #3A3A40;
    --gold:     #C8941E;
    --gold-lt:  #E0AA3A;
    --text:     #E6E2D8;
    --text-dim: #7A7870;
    --green:    #2E7D52;
    --red:      #A63228;
    --teal:     #4A9880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 8px 0;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  #game-container {
    position: relative;
    width: 100%;
    max-width: 800px;
  }

  /* SA flag ribbon */
  #flag-ribbon { display: flex; height: 3px; }
  #flag-ribbon span { flex: 1; }
  #flag-ribbon span:nth-child(1) { background: var(--green); }
  #flag-ribbon span:nth-child(2) { background: var(--gold); }
  #flag-ribbon span:nth-child(3) { background: var(--red); }

  #header {
    background: var(--surface);
    padding: 10px 0 9px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    text-align: center;
    font-size: clamp(1.1rem, 5vw, 1.75rem);
    letter-spacing: clamp(2px, 1vw, 6px);
    color: var(--gold);
  }

  /* Canvas scales to fill container width while keeping aspect ratio */
  #canvas {
    display: block;
    width: 100%;
    height: auto;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: pointer;
    touch-action: none;
  }

  #ui-bar {
    background: var(--surface);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    font-size: clamp(0.62rem, 2.5vw, 0.82rem);
    color: var(--gold);
    letter-spacing: 1px;
    border: 1px solid var(--border);
    border-top: none;
  }

  #instructions {
    background: var(--bg);
    color: var(--text-dim);
    text-align: center;
    font-size: clamp(0.55rem, 2vw, 0.7rem);
    letter-spacing: 0.5px;
    padding: 6px 8px 8px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }

  /* Character select — unused HTML version, kept hidden */
  #char-select { display: none; }

  /* Game over */
  #game-over {
    position: absolute; inset: 0;
    background: #18181Adc;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
  }
  #game-over h2 {
    font-size: clamp(1.1rem, 5vw, 1.7rem);
    color: var(--red);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .final-score {
    font-size: clamp(0.7rem, 3vw, 0.9rem);
    color: var(--gold);
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  .high-score {
    font-size: clamp(0.6rem, 2.5vw, 0.68rem);
    color: var(--text-dim);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  .btn {
    background: var(--gold);
    color: #111;
    border: none;
    padding: clamp(10px, 3vw, 12px) clamp(18px, 5vw, 28px);
    font-family: 'Courier New', monospace;
    font-size: clamp(0.7rem, 3vw, 0.82rem);
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    margin: 4px;
    min-height: 44px;   /* iOS tap target minimum */
    min-width: 44px;
  }
  .btn:hover { background: var(--gold-lt); }
  .btn:active { background: var(--gold-lt); }
  .btn.secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn.secondary:hover { color: var(--text); border-color: #666; }
  .btn.secondary:active { color: var(--text); border-color: #666; }

  /* Mobile: stack game-over buttons vertically for easier tapping */
  @media (max-width: 480px) {
    #game-over { gap: 2px; }
    #game-over h2 { letter-spacing: 2px; }
    .btn { display: block; width: 80%; text-align: center; }
  }
</style>
</head>
<body>
<div id="game-container">
<div id="flag-ribbon"><span></span><span></span><span></span></div>
<div id="header">
  <h1>🗳️ VOTE RUNNER</h1>
</div>
  <canvas id="canvas" width="800" height="280"></canvas>
  <div id="ui-bar">
    <span id="score-display">VOTES: 0</span>

// ─── PIXEL ART RENDERER ───────────────────────────────────────────────────────
function drawPixelArt(ctx, pixels, x, y, scale) {
  pixels.forEach(([px, py, color]) => {
    ctx.fillStyle = color;
    ctx.fillRect(x + px * scale, y + py * scale, scale, scale);
  });
}

// ─── DRAW: ENVELOPE (vote collectible) ───────────────────────────────────────
function drawEnvelope(ctx, x, y, t) {
  const bob = Math.sin(t * 0.08) * 3;
  const ex = Math.round(x), ey = Math.round(y + bob);
  ctx.save();
  // Body
  ctx.fillStyle = '#f5f0e0';
  ctx.fillRect(ex, ey, 22, 16);
  // Envelope flap (V shape via two triangles)
  ctx.fillStyle = '#ddd8c0';
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex + 11, ey + 8);
  ctx.lineTo(ex + 22, ey);
  ctx.closePath();
  ctx.fill();
  // Outline
  ctx.strokeStyle = '#b8a060';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(ex, ey, 22, 16);
  // X crease lines bottom half
  ctx.beginPath();
  ctx.moveTo(ex, ey + 16);
  ctx.lineTo(ex + 11, ey + 8);
  ctx.lineTo(ex + 22, ey + 16);
  ctx.strokeStyle = '#b8a06066';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Small stamp in top right
  ctx.fillStyle = '#378243';
  ctx.fillRect(ex + 15, ey + 3, 5, 4);
  ctx.restore();
}

// ─── DRAW: POTHOLE (hole in the ground) ──────────────────────────────────────
function drawPothole(ctx, x, groundY) {
  const pw = 50, ph = 18;
  const px = x, py = groundY;
  ctx.save();
  // Dark pit cut into the ground
  ctx.fillStyle = '#050a0f';
  ctx.beginPath();
  ctx.ellipse(px + pw/2, py + 4, pw/2, ph/2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Inner depth shadow
  ctx.fillStyle = '#0a0505';
  ctx.beginPath();
  ctx.ellipse(px + pw/2, py + 6, pw/2 - 6, ph/2 - 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Cracked tarmac edges above the hole
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px + 2, py);
  ctx.lineTo(px + 8, py - 5);
  ctx.moveTo(px + pw - 4, py);
  ctx.lineTo(px + pw - 10, py - 6);
  ctx.moveTo(px + pw/2 - 6, py);
  ctx.lineTo(px + pw/2 - 10, py - 7);
  ctx.stroke();
  // Hazard stripes just above the hole lip
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#e74c3c' : '#f5c518';
    ctx.fillRect(px + i * 10, py - 5, 10, 4);
  }
  ctx.restore();
}

// ─── DRAW: SA MINIBUS TAXI (HiAce style) ─────────────────────────────────────
function drawTaxi(ctx, x, groundY) {
  const tx = x;
  const wheelR = 10;
  const bodyW = 88;
  const bodyH = 44;
  const bodyBottom = groundY - wheelR * 2 + 4;
  const bodyTop = bodyBottom - bodyH;
  const roofTop = bodyTop - 10;

  ctx.save();

  // Shadow
  ctx.fillStyle = '#00000028';
  ctx.fillRect(tx + 6, groundY - 1, bodyW, 6);

  // Roof rack / high roof cap
  ctx.fillStyle = '#D0CCC0';
  ctx.fillRect(tx + 8, roofTop, bodyW - 14, 12);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(tx + 8, roofTop, bodyW - 14, 12);
  // Roof rack rails
  ctx.fillStyle = '#A0A090';
  ctx.fillRect(tx + 12, roofTop - 2, bodyW - 22, 3);
  ctx.fillRect(tx + 14, roofTop - 4, 4, 3);
  ctx.fillRect(tx + bodyW - 22, roofTop - 4, 4, 3);

  // Main body — warm white
  ctx.fillStyle = '#F5F2EA';
  ctx.beginPath();
  ctx.roundRect(tx, bodyTop, bodyW, bodyH, 3);
  ctx.fill();
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(tx, bodyTop, bodyW, bodyH, 3);
  ctx.stroke();

  // Body panel line (horizontal crease mid-body)
  ctx.strokeStyle = '#CCCCBB';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tx + 2, bodyTop + bodyH * 0.48);
  ctx.lineTo(tx + bodyW - 2, bodyTop + bodyH * 0.48);
  ctx.stroke();

  // Windscreen — tall, slight angle
  ctx.fillStyle = '#B8D8E8AA';
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tx + 5,  bodyTop + 3);
  ctx.lineTo(tx + 24, bodyTop + 1);
  ctx.lineTo(tx + 24, bodyTop + 22);
  ctx.lineTo(tx + 5,  bodyTop + 24);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Side windows — 3 rectangular, evenly spaced
  ctx.fillStyle = '#B8D8E888';
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  [[28, 4, 16, 14], [47, 4, 16, 14], [66, 4, 16, 14]].forEach(([wx, wy, ww, wh]) => {
    ctx.fillRect(tx + wx, bodyTop + wy, ww, wh);
    ctx.strokeRect(tx + wx, bodyTop + wy, ww, wh);
    // Window tint line
    ctx.fillStyle = '#4488AA22';
    ctx.fillRect(tx + wx, bodyTop + wy, ww, 4);
    ctx.fillStyle = '#B8D8E888';
  });

  // ── DECORATIVE STRIPE — SA taxi style wavy graphic band ──────────────────
  const sy = bodyTop + bodyH - 16;
  // Base stripe — deep green
  ctx.fillStyle = '#1A6B3A';
  ctx.fillRect(tx + 1, sy, bodyW - 2, 14);

  // Gold zigzag / chevron pattern over green
  ctx.fillStyle = '#E8A820';
  for (let i = 0; i < 8; i++) {
    const zx = tx + 2 + i * 11;
    ctx.beginPath();
    ctx.moveTo(zx,      sy + 1);
    ctx.lineTo(zx + 5,  sy + 7);
    ctx.lineTo(zx + 10, sy + 1);
    ctx.lineTo(zx + 10, sy + 4);
    ctx.lineTo(zx + 5,  sy + 10);
    ctx.lineTo(zx,      sy + 4);
    ctx.closePath();
    ctx.fill();
  }

  // Red stripe below chevrons
  ctx.fillStyle = '#B82020';
  ctx.fillRect(tx + 1, sy + 11, bodyW - 2, 3);

  // Black bumper strip
  ctx.fillStyle = '#111';
  ctx.fillRect(tx + 1, bodyBottom - 5, bodyW - 2, 7);
  // Bumper highlight
  ctx.fillStyle = '#333';
  ctx.fillRect(tx + 1, bodyBottom - 5, bodyW - 2, 2);

  // Headlight (yellow)
  ctx.fillStyle = '#FFE060';
  ctx.fillRect(tx + 3, bodyBottom - 22, 6, 5);
  ctx.strokeStyle = '#AA9900';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(tx + 3, bodyBottom - 22, 6, 5);

  // Front grille
  ctx.fillStyle = '#222';
  ctx.fillRect(tx + 3, bodyBottom - 16, 18, 8);
  ctx.fillStyle = '#444';
  for (let gi = 0; gi < 3; gi++) {
    ctx.fillRect(tx + 5 + gi * 5, bodyBottom - 14, 3, 5);
  }

  // Side door handle detail
  ctx.fillStyle = '#BBBBAA';
  ctx.fillRect(tx + 44, bodyTop + 24, 8, 2);

  // Wheels
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(tx + 18, groundY - wheelR, wheelR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tx + 68, groundY - wheelR, wheelR, 0, Math.PI*2); ctx.fill();
  // Tyre tread ring
  ctx.strokeStyle = '#2A2A2A';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(tx + 18, groundY - wheelR, wheelR - 2, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(tx + 68, groundY - wheelR, wheelR - 2, 0, Math.PI*2); ctx.stroke();
  // Hubcap
  ctx.fillStyle = '#CCCCCC';
  ctx.beginPath(); ctx.arc(tx + 18, groundY - wheelR, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tx + 68, groundY - wheelR, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#999';
  ctx.beginPath(); ctx.arc(tx + 18, groundY - wheelR, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(tx + 68, groundY - wheelR, 2, 0, Math.PI*2); ctx.fill();

  // Hooting sparks
  ctx.strokeStyle = '#FFD020'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(tx - 3, bodyTop + 8);  ctx.lineTo(tx - 10, bodyTop + 3);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx - 3, bodyTop + 18); ctx.lineTo(tx - 12, bodyTop + 18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx - 3, bodyTop + 28); ctx.lineTo(tx - 9,  bodyTop + 33); ctx.stroke();

  ctx.restore();
}

function drawGenerator(ctx, x, groundY) {
  const gx = x;
  const gh = 32; // generator body height
  const gy = groundY - gh; // top of body
  ctx.save();
  // Body
  ctx.fillStyle = '#c0531a';
  ctx.fillRect(gx + 4, gy, 36, gh);
  ctx.fillStyle = '#e67e22';
  ctx.fillRect(gx + 6, gy + 2, 32, gh - 8);

  ctx.fillStyle = '#333';
  ctx.fillRect(gx + 26, gy - 16, 10, 4);

  ctx.font = 'bold 14px Courier New';

}

// ─── LOADSHEDDING DARKNESS OVERLAY ───────────────────────────────────────────
function drawLoadsheddingOverlay(ctx, alpha, playerX, playerY) {
  if (alpha <= 0) return;
  // Full dark overlay
  ctx.save();
  ctx.globalAlpha = alpha * 0.92;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, 800, 280);
  ctx.globalAlpha = 1;

  // Cut out a small torch-cone of visibility around the player
  const cx = playerX + 16, cy = playerY - 8;
  const visRadius = Math.round(60 + (1 - alpha) * 80); // shrinks as darkness deepens
  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, visRadius);
  gradient.addColorStop(0,    `rgba(0,0,0,0)`);
  gradient.addColorStop(0.55, `rgba(0,0,0,0)`);
  gradient.addColorStop(1,    `rgba(0,0,0,${alpha * 0.92})`);
  ctx.globalCompositeOperation = 'destination-out';
  ctx.globalAlpha = 1;
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(cx, cy, visRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();

  // Flicker edge when first hitting
  if (alpha < 0.5) {
    ctx.save();
    ctx.globalAlpha = (0.5 - alpha) * 0.6 * (Math.random() > 0.5 ? 1 : 0);
    ctx.fillStyle = '#fff8dc';
    ctx.fillRect(0, 0, 800, 280);
    ctx.restore();
  }
}

function drawCharSelect() {
  const W = 800, H = 280;

  // Dark overlay
  ctx.fillStyle = '#18181Af8';
  ctx.fillRect(0, 0, W, H);

  // Detect if canvas is being displayed narrow (mobile)
  const displayWidth = canvas.getBoundingClientRect().width;
  const isMobile = displayWidth < 500;

  if (isMobile) {
    // ── 2×2 GRID LAYOUT ────────────────────────────────────────────────────
    const gap = 8;
    const cardW = Math.floor((W - gap * 3) / 2);
    const cardH = Math.floor((H - gap * 3) / 2);

    ctx.fillStyle = '#C8941E';
    ctx.font = 'bold 20px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('WHO HAS YOUR VOTE?', W / 2, 22);

    CHARACTERS.forEach((char, i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const cx = gap + col * (cardW + gap);
      const cy = gap * 1.5 + row * (cardH + gap) + 14;
      const isHovered = charSelectHover === i;

      // Card
      ctx.fillStyle = isHovered ? '#252528' : '#1A1A1E';
      ctx.strokeStyle = isHovered ? char.color : '#2E2E34';
      ctx.lineWidth = isHovered ? 2 : 1;
      ctx.beginPath();
      ctx.roundRect(cx, cy, cardW, cardH, 3);
      ctx.fill(); ctx.stroke();

      // Top bar
      ctx.fillStyle = char.color + (isHovered ? 'FF' : 'AA');
      ctx.fillRect(cx + 1, cy + 1, cardW - 2, 5);

      // Sprite — scale 5, centred
      const textStripH = 48;
      const spriteScale = 5;
      const spriteW = 14 * spriteScale;
      const spriteAreaH = cardH - textStripH - 6;
      const spriteX = cx + Math.floor((cardW - spriteW) / 2) - 4;
      const spriteY = cy + 6 + Math.floor((spriteAreaH - 14 * spriteScale) / 2);
      drawPixelArt(ctx, char.getFrames(Math.floor(t / 8)), spriteX, spriteY, spriteScale);

      // Text strip
      const textY = cy + cardH - textStripH;
      ctx.fillStyle = char.color + '44';
      ctx.fillRect(cx + 8, textY, cardW - 16, 1);

      ctx.fillStyle = char.color;
      ctx.font = 'bold 14px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(char.name, cx + cardW / 2, textY + 14);

      ctx.fillStyle = '#4A9880';
      ctx.font = '11px Courier New';
      ctx.fillText('★ ' + char.power.toUpperCase(), cx + cardW / 2, textY + 32);
    });

  } else {
    // ── 4-ACROSS LAYOUT (desktop) ──────────────────────────────────────────
    ctx.fillStyle = '#C8941E';
    ctx.font = 'bold 16px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('WHO HAS YOUR VOTE?', W / 2, 22);
    ctx.fillStyle = '#555';
    ctx.font = '10px Courier New';
    ctx.fillText('CLICK TO SELECT', W / 2, 34);

    const gap = 6;
    const cardW = Math.floor((W - gap * 5) / 4);
    const cardH = H - 40;
    const cy = 38;

    CHARACTERS.forEach((char, i) => {
      const cx = gap + i * (cardW + gap);
      const isHovered = charSelectHover === i;

      ctx.fillStyle = isHovered ? '#252528' : '#1A1A1E';
      ctx.strokeStyle = isHovered ? char.color : '#2E2E34';
      ctx.lineWidth = isHovered ? 2 : 1;
      ctx.beginPath();
      ctx.roundRect(cx, cy, cardW, cardH, 3);
      ctx.fill(); ctx.stroke();

      ctx.fillStyle = char.color + (isHovered ? 'FF' : 'BB');
      ctx.fillRect(cx + 1, cy + 1, cardW - 2, 5);

      const textStripH = 62;
      const spriteScale = 6;
      const spriteW = 14 * spriteScale;
      const spriteAreaH = cardH - textStripH - 8;
      const spriteX = cx + Math.floor((cardW - spriteW) / 2) - 4;
      const spriteY = cy + 8 + Math.floor((spriteAreaH - 14 * spriteScale) / 2);
      drawPixelArt(ctx, char.getFrames(Math.floor(t / 8)), spriteX, spriteY, spriteScale);

      const textY = cy + cardH - textStripH;
      ctx.fillStyle = char.color + '44';
      ctx.fillRect(cx + 8, textY, cardW - 16, 1);

      ctx.fillStyle = char.color;
      ctx.font = 'bold 11px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(char.name, cx + cardW / 2, textY + 12);

      ctx.fillStyle = '#888';
      ctx.font = '9px Courier New';
      const words = char.party.split(' ');
      const mid = Math.ceil(words.length / 2);
      ctx.fillText(words.slice(0, mid).join(' '), cx + cardW / 2, textY + 26);
      ctx.fillText(words.slice(mid).join(' '), cx + cardW / 2, textY + 38);

      ctx.fillStyle = '#4A9880';
      ctx.font = '9px Courier New';
      ctx.fillText('★ ' + char.power.toUpperCase(), cx + cardW / 2, textY + 52);
    });
  }

  ctx.textAlign = 'left';
}

// Track hover for char select
let charSelectHover = -1;

function getCharSelectIndex(mouseX, mouseY) {
  const displayWidth = canvas.getBoundingClientRect().width;
  const isMobile = displayWidth < 500;

  if (isMobile) {
    const gap = 8;
    const cardW = Math.floor((800 - gap * 3) / 2);
    const cardH = Math.floor((280 - gap * 3) / 2);
    for (let i = 0; i < 4; i++) {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const cx = gap + col * (cardW + gap);
      const cy = gap * 1.5 + row * (cardH + gap) + 14;
      if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH) {
        return i;
      }
    }
  } else {
    const gap = 6;
    const cardW = Math.floor((800 - gap * 5) / 4);
    const cardH = 280 - 40;
    const cy = 38;
    for (let i = 0; i < 4; i++) {
      const cx = gap + i * (cardW + gap);
      if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cy && mouseY <= cy + cardH) {
        return i;
      }
    }
  }
  return -1;
}

// ─── START / RESET ────────────────────────────────────────────────────────────
function startGame(char) {
  selectedChar = char;
  state = 'playing';
  score = 0; distance = 0; scrollX = 0; gameSpeed = 3; t = 0;
  obstacles = []; votes = []; particles = [];
  nextObstacle = 120; nextVote = 60;
  player.y = GROUND_Y; player.vy = 0; player.jumping = false; player.jumpsLeft = 2;
  loadsheddingAlpha = 0; loadsheddingTimer = 0; loadsheddingFading = false;
  document.getElementById('char-select').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
}

// ─── JUMP ─────────────────────────────────────────────────────────────────────
function doJump() {
  if (state !== 'playing') return;
  if (player.jumpsLeft > 0) {
    let jumpPower = -11;
    if (selectedChar.jumpBoost) jumpPower *= selectedChar.jumpBoost;
    if (selectedChar.jumpHeight && player.jumpsLeft === 2) jumpPower *= selectedChar.jumpHeight;
    player.vy = jumpPower;
    player.jumpsLeft--;
    player.jumping = true;
    spawnParticles(player.x + 8, player.y + 14, '#f5c51888', 5);
  }
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-2, life:20, color });
  }
}

// ─── GAME OVER ────────────────────────────────────────────────────────────────
function endGame() {
  state = 'gameover';
  if (score > highScore) { highScore = score; localStorage.setItem('voterunner_hi', highScore); }
  document.getElementById('final-score').textContent = `VOTES COLLECTED: ${score}`;
  document.getElementById('hi-score-display').textContent = `BEST: ${highScore}`;
  document.getElementById('game-over').style.display = 'flex';
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  if (state !== 'playing') return;
  t++;
  if (t % 300 === 0) gameSpeed = Math.min(gameSpeed + 0.3, 9);
  const speed = selectedChar.speedBoost ? gameSpeed * selectedChar.speedBoost : gameSpeed;
  scrollX += speed;
  distance = Math.floor(scrollX / 10);

  // Physics
  player.vy += 0.55;
  player.y += player.vy;
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y; player.vy = 0; player.jumping = false; player.jumpsLeft = 2;
  }

  // Spawn obstacles
  nextObstacle--;
  if (nextObstacle <= 0) {
    const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
    const w = type === 'pothole' ? 50 : type === 'taxi' ? 88 : 44;
    const h = type === 'pothole' ? 18 : type === 'taxi' ? 66 : 32;
    obstacles.push({ x:840, type, w, h });
    nextObstacle = Math.floor(90 / (speed / 3)) + Math.floor(Math.random() * 60);
  }

  // Spawn envelopes
  nextVote--;
  if (nextVote <= 0) {
    const vy = Math.random() < 0.4 ? GROUND_Y - 80 : GROUND_Y - 40;
    votes.push({ x:840, y:vy });
    nextVote = Math.floor(40 + Math.random() * 40);
  }

  // Move obstacles
  obstacles.forEach(ob => ob.x -= speed);
  obstacles = obstacles.filter(ob => ob.x > -80);

  // Move + collect envelopes
  const voteRadius = selectedChar.voteRadius || 30;
  votes = votes.filter(v => {
    v.x -= speed;
    const dx = (player.x + 10) - (v.x + 11);
    const dy = (player.y - 8) - (v.y + 8);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < voteRadius) { v.x += dx * 0.18; v.y += dy * 0.18; }
    if (dist < 18) { score++; spawnParticles(v.x+11, v.y+8, '#f5c518cc', 8); return false; }
    return v.x > -30;
  });

  // Collision with obstacles
  const px = player.x + 3, pw = 10, py = player.y - 14, ph = 14;
  obstacles.forEach(ob => {
    if (ob.type === 'pothole') {
      // Only collide if player is on the ground and over the hole
      if (player.y >= GROUND_Y - 2) {
        if (px < ob.x + ob.w - 4 && px + pw > ob.x + 4) endGame();
      }
    } else if (ob.type === 'loadshedding') {
      // Hitting generator triggers darkness, not instant death
      if (loadsheddingAlpha === 0 && loadsheddingTimer === 0) {
        const ox = ob.x + 4, ow = ob.w - 8;
        const oy = GROUND_Y - ob.h, oh = ob.h;
        if (px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) {
          // Trigger loadshedding effect
          loadsheddingTimer = 420; // ~7 seconds at 60fps
          loadsheddingFading = false;
          obstacles = obstacles.filter(o => o !== ob); // remove the generator
          spawnParticles(ob.x + 20, GROUND_Y - 20, '#e67e22cc', 16);

        }
      }
    } else {
      // Taxi — solid collision
      const ox = ob.x + 4, ow = ob.w - 8;
      const oy = GROUND_Y - ob.h, oh = ob.h;
      if (px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) endGame();
    }
  });

  // Loadshedding timer
  if (loadsheddingTimer > 0) {
    loadsheddingTimer--;
    if (!loadsheddingFading) {
      // Fade in darkness over 60 ticks
      loadsheddingAlpha = Math.min(1, loadsheddingAlpha + 0.016);
    }
    if (loadsheddingTimer <= 90) {
      // Start fading out in last 1.5s
      loadsheddingFading = true;
      loadsheddingAlpha = Math.max(0, loadsheddingTimer / 90);
    }
    if (loadsheddingTimer === 0) {
      loadsheddingAlpha = 0;
    }
  }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; p.vy += 0.1; });
  particles = particles.filter(p => p.life > 0);

  // UI
  document.getElementById('score-display').textContent = `VOTES: ${score}`;
  document.getElementById('distance-display').textContent = `DIST: ${distance}m`;
  document.getElementById('hi-display').textContent = `BEST: ${highScore}`;
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, 800, 280);
  drawBackground(ctx, scrollX);

  if (state === 'select') {
    drawCharSelect();
    return;
  }

  if (state === 'playing' || state === 'gameover') {
    // Envelopes
    votes.forEach(v => drawEnvelope(ctx, v.x, v.y, t));

    // Obstacles
    obstacles.forEach(ob => {
      if (ob.type === 'pothole') drawPothole(ctx, ob.x, GROUND_Y);
      else if (ob.type === 'taxi') drawTaxi(ctx, ob.x, GROUND_Y);
      else if (ob.type === 'loadshedding') drawGenerator(ctx, ob.x, GROUND_Y);
    });

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life / 20;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    });
    ctx.globalAlpha = 1;

    // Player
    if (selectedChar) {
      const animT = state === 'playing' ? t : 0;
      const pixels = selectedChar.getFrames(player.jumping ? 0 : animT);
      drawPixelArt(ctx, pixels, player.x - 4, player.y - 28, 2);
    }

    // Loadshedding darkness overlay — drawn LAST so it covers everything
    if (loadsheddingAlpha > 0) {
      drawLoadsheddingOverlay(ctx, loadsheddingAlpha, player.x, player.y);
    }

    // Speed indicator (on top of darkness so still visible)
    if (state === 'playing') {
      ctx.fillStyle = loadsheddingAlpha > 0.5 ? '#C8941Eaa' : '#00000044';
      ctx.font = 'bold 9px Courier New';
      ctx.textAlign = 'right';
      ctx.fillText(`SPD ${gameSpeed.toFixed(1)}x`, 794, 16);
      ctx.textAlign = 'left';
    }

    // On-screen loadshedding warning
    if (loadsheddingAlpha > 0) {
      const pulse = 0.65 + 0.35 * Math.abs(Math.sin(t * 0.08));
      ctx.save();
      ctx.globalAlpha = loadsheddingAlpha * pulse;
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      const warningText = '⚡ STAGE 6 LOADSHEDDING ACTIVE ⚡';
      const tw = ctx.measureText(warningText).width;
      ctx.fillStyle = '#18181Acc';
      ctx.beginPath();
      ctx.roundRect(400 - tw/2 - 12, 10, tw + 24, 22, 3);
      ctx.fill();
      ctx.fillStyle = '#C8941E';
      ctx.fillText(warningText, 400, 26);
      ctx.restore();
    }
  }
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); doJump(); }
});
canvas.addEventListener('click', (e) => {
  if (state === 'select') {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    const idx = getCharSelectIndex(mx, my);
    if (idx >= 0) startGame(CHARACTERS[idx]);
    return;
  }
  doJump();
});

canvas.addEventListener('mousemove', (e) => {
  if (state !== 'select') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  charSelectHover = getCharSelectIndex(mx, my);
  canvas.style.cursor = charSelectHover >= 0 ? 'pointer' : 'default';
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'select') {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const touch = e.touches[0];
    const mx = (touch.clientX - rect.left) * scaleX;
    const my = (touch.clientY - rect.top) * scaleY;
    const idx = getCharSelectIndex(mx, my);
    if (idx >= 0) startGame(CHARACTERS[idx]);
    return;
  }
  doJump();
}, { passive: false });
document.getElementById('retry-btn').addEventListener('click', () => startGame(selectedChar));
document.getElementById('change-btn').addEventListener('click', () => {
  state = 'select';
  charSelectHover = -1;
  document.getElementById('game-over').style.display = 'none';
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildCharSelect();
loop();
</script>
</body>
